<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎰 Mittagässe</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 DEINE FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBj3oyj0VOe1NSOv_ifjCe6fMqNuAJav4k",
  authDomain: "budefoode-2da04.firebaseapp.com",
  projectId: "budefoode-2da04",
  storageBucket: "budefoode-2da04.firebasestorage.app",
  messagingSenderId: "561212276934",
  appId: "1:561212276934:web:7c294ae7bd2a64e739d7c7",
  measurementId: "G-ZWNQG0XNE2"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.collection = collection;
window.addDoc = addDoc;
window.getDocs = getDocs;
window.query = query;
window.where = where;
</script>

<style>
body{
font-family:Arial;
background:#0b0f1a;
color:white;
text-align:center;
margin:0;
padding:10px;
}

h1{
color:#facc15;
}

.slot-machine{
margin:20px auto;
padding:15px;
background:#1f2937;
border-radius:20px;
max-width:350px;
}

.reels{
display:flex;
gap:8px;
}

.reel{
flex:1;
height:70px;
background:black;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
}

button{
width:100%;
padding:15px;
font-size:18px;
background:#facc15;
border:none;
border-radius:10px;
}

#winner{
margin-top:20px;
font-size:24px;
color:#22c55e;
display:none;
}

canvas{
background:white;
margin-top:20px;
}
</style>
</head>

<body>

<h1>🎰 Mittagässe</h1>

<select id="user">
<option>Dean</option>
<option>Borghi</option>
<option>Claudio</option>
<option>Düüdi</option>
<option>Hannes</option>
<option>Fabio</option>
<option>Jonas</option>
<option>Noah</option>
<option>Patrick</option>
<option>Christian</option>
</select>


<div class="slot-machine">
<div class="reels">
<div class="reel" id="r1">🍽️</div>
<div class="reel" id="r2">🍽️</div>
<div class="reel" id="r3">🍽️</div>
</div>
<button id="spinBtn" onclick="spin()">🎰 DREHEN</button>
</div>

<div id="winner"></div>
<canvas id="chart"></canvas>

<script>

const states=[
"Sterne","S'Gocht","Wiesetal","Thai",
"Krüüz","Pizza","Döner","Mägges"
]

const users=[
"Dean","Borghi","Claudio","Düüdi","Hannes",
"Fabio","Jonas","Noah","Patrick","Christian"
]
let chartInstance=null

function today(){
let d=new Date()
return d.getUTCFullYear()+"-"+String(d.getUTCMonth()+1).padStart(2,'0')+"-"+String(d.getUTCDate()).padStart(2,'0')
}

/* 🔒 LOCAL LOCK (gegen Refresh Cheat) */
function hasPlayedLocal(user){
let data=JSON.parse(localStorage.getItem("plays")||"{}")
return data[user]===today()
}

function setPlayedLocal(user){
let data=JSON.parse(localStorage.getItem("plays")||"{}")
data[user]=today()
localStorage.setItem("plays",JSON.stringify(data))
}

/* 🎰 SPIN */

async function spin(){

let user=document.getElementById("user").value
let btn=document.getElementById("spinBtn")

/* 🔒 LOCAL CHECK */
if(hasPlayedLocal(user)){
alert("Du hast heute schon gedreht")
return
}

btn.disabled=true

/* 🔒 FIREBASE CHECK (pro User!) */
let q=window.query(
window.collection(window.db,"spins"),
window.where("user","==",user),
window.where("date","==",today())
)

let snap=await window.getDocs(q)

if(!snap.empty){
alert("Du Schlingel häsch hüt schu dreiht!")
setPlayedLocal(user)
btn.disabled=false
return
}

/* 🎰 Animation */

let reels=["r1","r2","r3"]
let spins=0

let anim=setInterval(()=>{

reels.forEach(id=>{
document.getElementById(id).innerText=
states[Math.floor(Math.random()*states.length)]
})

spins++

if(spins>20){

clearInterval(anim)

let result=states[Math.floor(Math.random()*states.length)]

reels.forEach(id=>{
document.getElementById(id).innerText=result
})

/* 🔥 speichern */
await window.addDoc(
window.collection(window.db,"spins"),
{
user:user,
result:result,
date:today()
})

/* 🔒 local sperre setzen */
setPlayedLocal(user)

loadStats()
btn.disabled=false

}

},80)

}

/* 📊 LOAD STATS */

async function loadStats(){

let snap=await window.getDocs(window.collection(window.db,"spins"))

let count={}
states.forEach(s=>count[s]=0)

let todayDate=today()

snap.forEach(doc=>{
let d=doc.data()
if(d.date===todayDate){
count[d.result]++
}
})

updateChart(count)
checkWinner(count)

}

/* 📊 CHART */

function updateChart(count){

let ctx=document.getElementById("chart").getContext("2d")

if(chartInstance){
chartInstance.destroy()
}

chartInstance=new Chart(ctx,{
type:"bar",
data:{
labels:Object.keys(count),
datasets:[{data:Object.values(count)}]
},
options:{
responsive:true,
scales:{y:{beginAtZero:true}},
plugins:{legend:{display:false}}
}
})

}

/* 🏆 WINNER */

function checkWinner(count){

let total=Object.values(count).reduce((a,b)=>a+b,0)

if(total<users.length)return

let winner=Object.keys(count).reduce((a,b)=>count[a]>count[b]?a:b)

let div=document.getElementById("winner")
div.style.display="block"
div.innerText="🏆 GEWINNER: "+winner.toUpperCase()

}

/* 🔄 AUTO UPDATE */
setInterval(loadStats,5000)

/* START */
loadStats()

</script>

</body>
</html>
