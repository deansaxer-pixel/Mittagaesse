<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 Mittagässe</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial;background:#0b0f1a;color:white;text-align:center;margin:0;padding:10px;}
h1{color:#facc15;}
.slot-machine{margin:20px auto;padding:15px;background:#1f2937;border-radius:20px;max-width:350px;}
.reels{display:flex;gap:8px;}
.reel{flex:1;height:70px;background:black;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:16px;}
button{width:100%;padding:15px;font-size:18px;background:#facc15;border:none;border-radius:10px;margin-top:10px;}
#winner{margin-top:20px;font-size:24px;color:#22c55e;display:none;}
canvas{background:white;margin-top:20px;}
</style>
</head>
<body>

<h1>🎰 Mittagässe</h1>

<select id="user">
<option>Dean</option>
<option>Borghi</option>
<option>Claudio</option>
<option>Düüdi</option>
<option>Hannes</option>
<option>Fabio</option>
<option>Jonas</option>
<option>Noah</option>
<option>Patrick</option>
<option>Christian</option>
</select>


<div class="slot-machine">
<div class="reels">
<div class="reel" id="r1">🍽️</div>
<div class="reel" id="r2">🍽️</div>
<div class="reel" id="r3">🍽️</div>
</div>
<button id="spinBtn">🎰 DREHEN</button>
</div>

<div id="winner"></div>
<canvas id="chart"></canvas>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBj3oyj0VOe1NSOv_ifjCe6fMqNuAJav4k",
  authDomain: "budefoode-2da04.firebaseapp.com",
  projectId: "budefoode-2da04",
  storageBucket: "budefoode-2da04.firebasestorage.app",
  messagingSenderId: "561212276934",
  appId: "1:561212276934:web:7c294ae7bd2a64e739d7c7",
  measurementId: "G-ZWNQG0XNE2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* STATES & USERS */
const states = ["Sterne","S'Gocht","Wiesetal","Thai","Krüüz","Pizza","Döner","Mägges"];
const users=[
"Dean","Borghi","Claudio","Düüdi","Hannes",
"Fabio","Jonas","Noah","Patrick","Christian"
]

let chartInstance = null;

function today(){
  const d = new Date();
  return d.getUTCFullYear()+"-"+String(d.getUTCMonth()+1).padStart(2,'0')+"-"+String(d.getUTCDate()).padStart(2,'0');
}

/* LOCAL STORAGE LOCK */
function hasPlayed(user){
  const data = JSON.parse(localStorage.getItem("plays")||"{}");
  return data[user] === today();
}
function setPlayed(user){
  const data = JSON.parse(localStorage.getItem("plays")||"{}");
  data[user] = today();
  localStorage.setItem("plays", JSON.stringify(data));
}

/* UPDATE CHART */
function updateChart(count){
  const ctx = document.getElementById("chart").getContext("2d");
  if(chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx,{
    type:"bar",
    data:{
      labels:Object.keys(count),
      datasets:[{data:Object.values(count)}]
    },
    options:{responsive:true,scales:{y:{beginAtZero:true}},plugins:{legend:{display:false}}}
  });
}

/* LOAD STATS */
async function loadStats(){
  const snap = await getDocs(collection(db,"spins"));
  let count = {}; states.forEach(s=>count[s]=0);
  let playedUsers = new Set();
  snap.forEach(doc=>{
    const d = doc.data();
    if(d.date === today()){
      count[d.result]++;
      playedUsers.add(d.user);
    }
  });
  updateChart(count);
  checkWinner(count, playedUsers);
}

/* CHECK WINNER */
function checkWinner(count, playedUsers){
  if(playedUsers.size < users.length) return; // noch nicht alle gespielt
  const winner = Object.keys(count).reduce((a,b)=>count[a]>count[b]?a:b);
  const div = document.getElementById("winner");
  div.style.display = "block";
  div.innerText = "🏆 GEWINNER: "+winner.toUpperCase();
}

/* SPIN BUTTON */
document.getElementById("spinBtn").addEventListener("click", async ()=>{
  const user = document.getElementById("user").value;
  const btn = document.getElementById("spinBtn");
  if(hasPlayed(user)){alert("Du Schlingel häsch hüt schu dreiht!"); return;}
  btn.disabled = true;

  // Animation
  const reels = ["r1","r2","r3"];
  let spins = 0;
  const anim = setInterval(async ()=>{
    reels.forEach(id=>{document.getElementById(id).innerText = states[Math.floor(Math.random()*states.length)];});
    spins++;
    if(spins>20){
      clearInterval(anim);
      const result = states[Math.floor(Math.random()*states.length)];
      reels.forEach(id=>{document.getElementById(id).innerText = result;});
      // SAVE per User pro Tag
      await setDoc(doc(db,"spins",user+"_"+today()),{user,user,result,date:today()});
      setPlayed(user);
      await loadStats();
      btn.disabled = false;
    }
  },80);
});

/* AUTO UPDATE */
setInterval(loadStats,5000);
loadStats();
</script>
</body>
</html>
