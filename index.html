<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🎰 Mittagässe</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(180deg,#0b0f1a,#111827);
color:white;
text-align:center;
}

h1{
margin-top:20px;
font-size:40px;
color:#facc15;
text-shadow:0 0 10px #facc15;
}

/* SLOT MACHINE */

.slot-machine{
margin:30px auto;
padding:20px;
background:#1f2937;
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,0.8);
width:320px;
}

.reels{
display:flex;
justify-content:space-between;
margin:20px 0;
}

.reel{
background:#000;
width:90px;
height:90px;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
border-radius:10px;
box-shadow:inset 0 0 10px #000;
text-align:center;
padding:5px;
}

/* BUTTON */

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
background:#facc15;
color:black;
font-weight:bold;
box-shadow:0 0 15px #facc15;
}

button:hover{
background:#fde047;
}

/* SELECT */

select{
padding:10px;
font-size:16px;
margin-top:10px;
}

/* CHART */

canvas{
background:white;
border-radius:10px;
margin-top:30px;
}

/* 🏆 WINNER STYLE */

#winner{
font-size:40px;
margin-top:30px;
color:#22c55e;
text-shadow:0 0 15px #22c55e, 0 0 30px #22c55e;
display:none;
}

</style>
</head>

<body>

<h1>🎰 Mittagässe</h1>

<select id="user">
<option>Dean</option>
<option>Borghi</option>
<option>Claudio</option>
<option>Düüdi</option>
<option>Hannes</option>
<option>Fabio</option>
<option>Patrick</option>
<option>Noah</option>
<option>Jonas</option>
<option>Christian</option>
</select>

<div class="slot-machine">

<div class="reels">
<div class="reel" id="r1">🍽️</div>
<div class="reel" id="r2">🍽️</div>
<div class="reel" id="r3">🍽️</div>
</div>

<button onclick="spin()">SPIN</button>

</div>

<!-- 🏆 Gewinner Anzeige -->
<div id="winner"></div>

<canvas id="chart" width="600" height="300"></canvas>

<script>

const states=[
"Sterne","S'Gocht","Wiesetal","Thai",
"Krüüz","Pizza","Döner","Mägges"
]

const users=[
"Dean","Borghi","Claudio","Hannes","Fabio",
"Patrick","Düüdi","Noah","Christian","Jonas"
]

let results=JSON.parse(localStorage.getItem("results"))||[]
let plays=JSON.parse(localStorage.getItem("plays"))||{}

let chartInstance=null

function today(){
return new Date().toISOString().slice(0,10)
}

function spin(){

let user=document.getElementById("user").value

if(plays[user]==today()){
alert("Du Schlingel häsch Hüt schu dreiht!")
return
}

let reels=["r1","r2","r3"]
let spins=0

let anim=setInterval(()=>{

reels.forEach(id=>{
document.getElementById(id).innerText=
states[Math.floor(Math.random()*states.length)]
})

spins++

if(spins>20){

clearInterval(anim)

let result=states[Math.floor(Math.random()*states.length)]

document.getElementById("r1").innerText=result
document.getElementById("r2").innerText=result
document.getElementById("r3").innerText=result

results.push(result)
plays[user]=today()

localStorage.setItem("results",JSON.stringify(results))
localStorage.setItem("plays",JSON.stringify(plays))

updateChart()
checkWinner()

}

},80)

}

function updateChart(){

let count={}
states.forEach(s=>count[s]=0)

results.forEach(r=>count[r]++)

let canvas=document.getElementById("chart")
let ctx=canvas.getContext("2d")

if(chartInstance){
chartInstance.destroy()
}

canvas.width=600

chartInstance=new Chart(ctx,{
type:"bar",
data:{
labels:Object.keys(count),
datasets:[{
label:"Anzahl",
data:Object.values(count)
}]
},
options:{
responsive:false,
scales:{
y:{beginAtZero:true}
},
plugins:{
legend:{display:false}
}
}
})

}

/* 🏆 Gewinner Logik */

function checkWinner(){

let todayDate=today()

let playedToday = Object.values(plays)
.filter(d=>d===todayDate).length

if(playedToday < users.length){
return
}

/* zählen */
let count={}
states.forEach(s=>count[s]=0)

results.forEach(r=>count[r]++)

/* bestes finden */
let winnerState = Object.keys(count).reduce((a,b)=>
count[a] > count[b] ? a : b
)

let winnerDiv=document.getElementById("winner")

winnerDiv.style.display="block"
winnerDiv.innerText="🏆 GEWINNER: " + winnerState.toUpperCase()

}

updateChart()
checkWinner()

</script>

</body>
</html>
