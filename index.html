<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🎰 Mittagässe</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(180deg,#0b0f1a,#111827);
color:white;
text-align:center;
}

h1{
margin-top:20px;
font-size:40px;
color:#facc15;
text-shadow:0 0 10px #facc15;
}

/* SLOT MACHINE */

.slot-machine{
margin:30px auto;
padding:20px;
background:#1f2937;
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,0.8);
width:320px;
}

.reels{
display:flex;
justify-content:space-between;
margin:20px 0;
}

.reel{
background:#000;
width:90px;
height:90px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
border-radius:10px;
box-shadow:inset 0 0 10px #000;
}

/* BUTTON */

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
background:#facc15;
color:black;
font-weight:bold;
box-shadow:0 0 15px #facc15;
}

button:hover{
background:#fde047;
}

/* SELECT */

select{
padding:10px;
font-size:16px;
margin-top:10px;
}

/* CHART */

canvas{
background:white;
border-radius:10px;
margin-top:30px;
}

</style>
</head>

<body>

<h1>🎰 Mittagässe</h1>

<select id="user">
<option>Dean</option>
<option>Borghi</option>
<option>Hannes</option>
<option>Fabio</option>
<option>Düüdi</option>
<option>Patrick</option>
<option>Claudio</option>
<option>Christian</option>
<option>Jonas</option>
<option>Noah</option>
</select>

<div class="slot-machine">

<div class="reels">
<div class="reel" id="r1">🍽️</div>
<div class="reel" id="r2">🍽️</div>
<div class="reel" id="r3">🍽️</div>
</div>

<button onclick="spin()">SPIN</button>

</div>

<canvas id="chart" width="600" height="300"></canvas>

<script>

const states=[
"Sterne","S'Gocht","Wiesetal","Thai",
"Krüüz","Pizza","Döner","Mägges"
]

let results=JSON.parse(localStorage.getItem("results"))||[]
let plays=JSON.parse(localStorage.getItem("plays"))||{}

function today(){
return new Date().toISOString().slice(0,10)
}

function spin(){

let user=document.getElementById("user").value

if(plays[user]==today()){
alert("Du hast heute schon gedreht")
return
}

let reels=["r1","r2","r3"]

let spins=0

let anim=setInterval(()=>{

reels.forEach(id=>{
document.getElementById(id).innerText=
states[Math.floor(Math.random()*states.length)]
})

spins++

if(spins>20){

clearInterval(anim)

let result=states[Math.floor(Math.random()*states.length)]

document.getElementById("r1").innerText=result
document.getElementById("r2").innerText=result
document.getElementById("r3").innerText=result

results.push(result)
plays[user]=today()

localStorage.setItem("results",JSON.stringify(results))
localStorage.setItem("plays",JSON.stringify(plays))

let chartInstance = null;

function updateChart(){

let count={}

states.forEach(s=>count[s]=0)

results.forEach(r=>count[r]++)


if(chartInstance){
chartInstance.destroy()
}

/* Neues Chart erstellen */
chartInstance = new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:Object.keys(count),
datasets:[{
data:Object.values(count)
}]
},
options:{
plugins:{
legend:{display:false}
}
}
})

}

}

},80)

}

</script>

</body>
</html>
