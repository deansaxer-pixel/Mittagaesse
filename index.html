<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 Mittagässe</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#0b0f1a;color:white;text-align:center;padding:10px;}
h1{color:#facc15;}
.slot-machine{margin:20px auto;padding:15px;background:#1f2937;border-radius:20px;max-width:350px;}
.reels{display:flex;gap:8px;margin:20px 0;}
.reel{flex:1;height:70px;background:black;display:flex;align-items:center;justify-content:center;border-radius:10px;}
button{width:100%;padding:15px;font-size:18px;background:#facc15;border:none;border-radius:10px;}
canvas{background:white;margin-top:20px;border-radius:10px;}
#winner{margin-top:20px;font-size:24px;color:#22c55e;display:none;}
</style>
</head>

<body>

<h1>🎰 Mittagässe</h1>

<select id="user">
<option>Dean</option>
<option>Borghi</option>
<option>Claudio</option>
<option>Düüdi</option>
<option>Hannes</option>
<option>Fabio</option>
<option>Jonas</option>
<option>Noah</option>
<option>Patrick</option>
<option>Christian</option>
</select>


<div class="slot-machine">
<div class="reels">
<div class="reel" id="r1">🍽️</div>
<div class="reel" id="r2">🍽️</div>
<div class="reel" id="r3">🍽️</div>
</div>
<button id="spinBtn">🎰 DREHEN</button>
</div>

<div id="winner"></div>
<canvas id="chart"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBj3oyj0VOe1NSOv_ifjCe6fMqNuAJav4k",
  authDomain: "budefoode-2da04.firebaseapp.com",
  projectId: "budefoode-2da04",
  storageBucket: "budefoode-2da04.firebasestorage.app",
  messagingSenderId: "561212276934",
  appId: "1:561212276934:web:7c294ae7bd2a64e739d7c7",
  measurementId: "G-ZWNQG0XNE2"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* STATES */
const states=["Sterne","S'Gocht","Wiesetal","Thai","Krüüz","Pizza","Döner","Mägges"];
const users=[
"Dean","Borghi","Claudio","Düüdi","Hannes",
"Fabio","Jonas","Noah","Patrick","Christian"
]


let chart;

/* DATE */
function today(){
let d=new Date()
return d.getUTCFullYear()+"-"+String(d.getUTCMonth()+1).padStart(2,'0')+"-"+String(d.getUTCDate()).padStart(2,'0')
}

/* CHART */
function updateChart(count){

let ctx=document.getElementById("chart").getContext("2d")

if(chart) chart.destroy()

chart=new Chart(ctx,{
type:"bar",
data:{
labels:states,
datasets:[{data:states.map(s=>count[s])}]
},
options:{
responsive:true,
scales:{y:{beginAtZero:true}},
plugins:{legend:{display:false}}
}
})
}

/* LOAD */
async function loadStats(){

let snap=await getDocs(collection(db,"spins"))

let count={}
states.forEach(s=>count[s]=0)

let playedUsers=new Set()

snap.forEach(doc=>{
let d=doc.data()

if(d.date===today()){
count[d.result]++
playedUsers.add(d.user)
}
})

updateChart(count)
checkWinner(count,playedUsers)

}

/* WINNER */
function checkWinner(count,playedUsers){

if(playedUsers.size<users.length) return

let winner=states.reduce((a,b)=>count[a]>count[b]?a:b)

let div=document.getElementById("winner")
div.style.display="block"
div.innerText="🏆 GEWINNER: "+winner.toUpperCase()

}

/* SPIN */
document.getElementById("spinBtn").addEventListener("click",async()=>{

let user=document.getElementById("user").value
let btn=document.getElementById("spinBtn")

let id=today()+"_"+user

let docRef=doc(db,"spins",id)
let docSnap=await getDoc(docRef)

if(docSnap.exists()){
alert("Du Schlingel häsch hüt schu dreiht!")
return
}

btn.disabled=true

let reels=["r1","r2","r3"]
let spins=0

let anim=setInterval(async()=>{

reels.forEach(id=>{
document.getElementById(id).innerText=
states[Math.floor(Math.random()*states.length)]
})

spins++

if(spins>20){

clearInterval(anim)

let result=states[Math.floor(Math.random()*states.length)]

reels.forEach(id=>{
document.getElementById(id).innerText=result
})

/* SAVE */
await setDoc(docRef,{
user:user,
result:result,
date:today()
})

await loadStats()

btn.disabled=false

}

},80)

})

/* AUTO REFRESH */
setInterval(loadStats,5000)

/* START */
loadStats()

</script>

</body>
</html>
