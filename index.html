<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- 🔥 wichtig für Mobile -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎰 Mittagässe</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(180deg,#0b0f1a,#111827);
color:white;
text-align:center;
margin:0;
padding:10px;
}

h1{
margin-top:10px;
font-size:28px;
color:#facc15;
text-shadow:0 0 10px #facc15;
}

/* SLOT MACHINE */

.slot-machine{
margin:20px auto;
padding:15px;
background:#1f2937;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.8);
width:100%;
max-width:350px;
}

.reels{
display:flex;
justify-content:space-between;
gap:8px;
margin:20px 0;
}

.reel{
background:#000;
flex:1;
height:70px;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
border-radius:10px;
box-shadow:inset 0 0 10px #000;
padding:5px;
text-align:center;
}

/* BUTTON */

button{
width:100%;
max-width:300px;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#facc15;
color:black;
font-weight:bold;
box-shadow:0 0 10px #facc15;
}

button:active{
transform:scale(0.95);
}

/* SELECT */

select{
width:100%;
max-width:300px;
padding:12px;
font-size:16px;
margin-top:10px;
border-radius:8px;
}

/* WINNER */

#winner{
font-size:28px;
margin-top:20px;
color:#22c55e;
text-shadow:0 0 10px #22c55e, 0 0 20px #22c55e;
display:none;
}

/* CHART */

canvas{
background:white;
border-radius:10px;
margin-top:20px;
width:100% !important;
height:auto !important;
}

</style>
</head>

<body>

<h1>🎰 Mittagässe</h1>

<select id="user">
<option>Dean</option>
<option>Borghi</option>
<option>Claudio</option>
<option>Düüdi</option>
<option>Hannes</option>
<option>Fabio</option>
<option>Jonas</option>
<option>Noah</option>
<option>Patrick</option>
<option>Christian</option>
</select>

<div class="slot-machine">

<div class="reels">
<div class="reel" id="r1">🍽️</div>
<div class="reel" id="r2">🍽️</div>
<div class="reel" id="r3">🍽️</div>
</div>

<button onclick="spin()">🎰 DREHEN</button>

</div>

<div id="winner"></div>

<canvas id="chart"></canvas>

<script>

const states=[
"Sterne","S'Gocht","Wiesetal","Thai",
"Krüüz","Pizza","Döner","Mägges"
]

const users=[
"Dean","Borghi","Claudio","Düüdi","Hannes",
"Fabio","Jonas","Noah","Patrick","Christian"
]

let results=JSON.parse(localStorage.getItem("results"))||[]
let plays=JSON.parse(localStorage.getItem("plays"))||{}

let chartInstance=null

function today(){
return new Date().toISOString().slice(0,10)
}

function spin(){

let user=document.getElementById("user").value

if(plays[user]==today()){
alert("Du Schlingel häsch hüt schu dreiht!")
return
}

let reels=["r1","r2","r3"]
let spins=0

let anim=setInterval(()=>{

reels.forEach(id=>{
document.getElementById(id).innerText=
states[Math.floor(Math.random()*states.length)]
})

spins++

if(spins>20){

clearInterval(anim)

let result=states[Math.floor(Math.random()*states.length)]

document.getElementById("r1").innerText=result
document.getElementById("r2").innerText=result
document.getElementById("r3").innerText=result

results.push(result)
plays[user]=today()

localStorage.setItem("results",JSON.stringify(results))
localStorage.setItem("plays",JSON.stringify(plays))

updateChart()
checkWinner()

}

},80)

}

function updateChart(){

let count={}
states.forEach(s=>count[s]=0)

results.forEach(r=>count[r]++)

let ctx=document.getElementById("chart").getContext("2d")

if(chartInstance){
chartInstance.destroy()
}

chartInstance=new Chart(ctx,{
type:"bar",
data:{
labels:Object.keys(count),
datasets:[{
data:Object.values(count)
}]
},
options:{
responsive:true,
scales:{
y:{beginAtZero:true}
},
plugins:{
legend:{display:false}
}
}
})

}

function checkWinner(){

let todayDate=today()

let playedToday = Object.values(plays)
.filter(d=>d===todayDate).length

if(playedToday < users.length){
return
}

let count={}
states.forEach(s=>count[s]=0)

results.forEach(r=>count[r]++)

let winnerState = Object.keys(count).reduce((a,b)=>
count[a] > count[b] ? a : b
)

let winnerDiv=document.getElementById("winner")

winnerDiv.style.display="block"
winnerDiv.innerText="🏆 GEWINNER: " + winnerState.toUpperCase()

}

updateChart()
checkWinner()

</script>

</body>
</html>
